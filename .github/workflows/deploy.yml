name: Deploy HR Cloud App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to HR Cloud Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          # These secrets must point to dedicated hr-cloud infrastructure.
          # Do not reuse the MFN HR production host, user, SSH key, or port.
          host: ${{ secrets.HR_CLOUD_SERVER_HOST }}
          username: ${{ secrets.HR_CLOUD_SERVER_USER }}
          key: ${{ secrets.HR_CLOUD_SERVER_SSH_KEY }}
          port: ${{ secrets.HR_CLOUD_SERVER_PORT }}

          script: |
            echo "Starting hr-cloud deployment..."

            # This directory must contain the hr-cloud fork checkout, not the
            # original MFN HR application.
            cd /home/hr-cloud/hr-cloud-app

            echo "Pulling latest code"
            git pull origin main

            echo "Installing dependencies"
            npm ci

            echo "Generating Prisma client"
            npm run prisma:generate

            echo "Running migrations"
            npx prisma migrate deploy

            echo "Building Next.js app"
            npm run build

            echo "Restarting application"
            # This PM2 app name must remain distinct from the MFN HR process.
            pm2 restart hr-cloud

            echo "hr-cloud deployment complete"
