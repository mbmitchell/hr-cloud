version: 1.0
runtime: nodejs22

build:
  commands:
    pre-build:
      - npm ci
    build:
      - npx prisma generate
      - npm run build

run:
  runtime-version: 22.14.0
  command: sh -c "npx prisma migrate deploy && npm run start"
  network:
    port: 3000
  env:
    - name: NODE_ENV
      value: production
    - name: DEV_OVERRIDE
      value: "false"
    - name: AUTH_ENABLE_DEV_AUTH
      value: "false"
    - name: DATABASE_URL
      value: "SET_IN_APP_RUNNER"
    - name: NEXTAUTH_SECRET
      value: "SET_IN_APP_RUNNER"
    - name: NEXTAUTH_URL
      value: "https://your-app.example.com"
