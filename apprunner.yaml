version: 1.0
runtime: nodejs22

# HR Cloud deployment template
# Replace all placeholder values with hr-cloud-specific infrastructure settings
# before use. Do not reuse MFN HR production URLs, secrets, mailbox identities,
# databases, storage roots, or internal job keys.

build:
  commands:
    pre-build:
      - npm ci
    build:
      - npx prisma generate
      - npm run build

run:
  runtime-version: 22.14.0
  command: sh -c "npx prisma migrate deploy && npm run start"
  network:
    port: 3000
  env:
    - name: NODE_ENV
      value: production
    - name: DEV_OVERRIDE
      value: "false"
    - name: AUTH_ENABLE_DEV_AUTH
      value: "false"
    - name: AUTH_ENABLE_DEV_USER_SWITCHER
      value: "false"
    - name: DATABASE_URL
      value: "SET_HR_CLOUD_DATABASE_URL"
    - name: NEXTAUTH_SECRET
      value: "SET_HR_CLOUD_NEXTAUTH_SECRET"
    # The Entra redirect URI for this deployment must be:
    # https://hr-cloud.example.com/api/auth/callback/microsoft-entra-id
    #
    # AUTH_MICROSOFT_ENTRA_ID_ID must be the Entra Application (client) ID GUID,
    # not the api://... Application ID URI. AUTH_MICROSOFT_ENTRA_ID_ISSUER should
    # be tenant-specific, for example:
    # https://login.microsoftonline.com/HR_CLOUD_TENANT_ID/v2.0
    - name: AUTH_MICROSOFT_ENTRA_ID_ID
      value: "SET_HR_CLOUD_ENTRA_APP_CLIENT_ID_GUID"
    - name: AUTH_MICROSOFT_ENTRA_ID_SECRET
      value: "SET_HR_CLOUD_ENTRA_APP_CLIENT_SECRET"
    - name: AUTH_MICROSOFT_ENTRA_ID_ISSUER
      value: "https://login.microsoftonline.com/HR_CLOUD_TENANT_ID/v2.0"
    - name: NEXTAUTH_URL
      value: "https://hr-cloud.example.com"
    - name: APP_BASE_URL
      value: "https://hr-cloud.example.com"
    - name: EMAIL_TRANSPORT
      value: "graph"
    - name: EMAIL_FROM
      value: "notifications@hr-cloud.example.com"
    - name: EMAIL_REPLY_TO
      value: "hr@hr-cloud.example.com"
    - name: GRAPH_TENANT_ID
      value: "SET_HR_CLOUD_GRAPH_TENANT_ID"
    - name: GRAPH_CLIENT_ID
      value: "SET_HR_CLOUD_GRAPH_CLIENT_ID"
    - name: GRAPH_CLIENT_SECRET
      value: "SET_HR_CLOUD_GRAPH_CLIENT_SECRET"
    - name: GRAPH_MAILBOX_USER_ID
      value: "notifications@hr-cloud.example.com"
    - name: DOCUMENT_STORAGE_ROOT
      value: "/var/lib/hr-cloud-documents"
    - name: INTERNAL_JOB_SECRET
      value: "SET_HR_CLOUD_INTERNAL_JOB_SECRET"
